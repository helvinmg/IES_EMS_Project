<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %}</title>
    <style>
        #offer
        {
            background-color: lightgreen;
            border: red solid 10px;
        }
        body{background-color:lightyellow}
        nav{
            list-style: none;
            background-color: lightgrey;
        }
        nav ul{
            display: flex;
            justify-content: space-around;
        }
        nav ul li {
            display: block;
            padding: 10px;
        }
        li a{
            text-decoration: none;
            color:red
        }
        ul li:hover{
            background-color: lightgreen;
        }
        footer{
            text-align:center;
            background-color: lightgrey;
            padding: 10px;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="/home">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
            <li><a href="/emplist">Employees</a></li>
            <li><a href="/managerlist">Managers</a></li>
        </ul>
    </nav>
    {% block content %}
    <!--the blocked named content is reserved for child-->
    {% endblock %}
    <!-- <h1 style="color:red">Common Content</h1> -->
    {% block content2 %}
    <!--Extra Content is from Child Template-->
    {% endblock %}
    <footer>
        All rights reserved &copy hmg 2025
    </footer>
</body>
</html>
